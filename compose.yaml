x-app-env: &app-env
  env_file:
    - .env
  environment:
    - DATABASE_HOST=postgresql
    - AWS_S3_ENDPOINT_URL=http://garage:3900
    - CELERY_BROKER_URL=redis://redis:6379/0

services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: uv run manage.py tailwind runserver 0.0.0.0:8000
    ports:
      - 8000:8000
    <<: *app-env
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
        - action: sync+restart
          path: uv.lock
          target: /app/uv.lock
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_started
    restart: on-failure
    tty: true

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: uv run celery -A lulzcasz_dev worker --loglevel=INFO --concurrency=2
    <<: *app-env
    develop:
      watch:
        - action: sync+restart
          path: ./
          target: /app
        - action: sync+restart
          path: uv.lock
          target: /app/uv.lock
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  postgresql:
    image: postgres:18.4-alpine3.23@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    environment:
      POSTGRES_DB: lulzcasz_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lulzcasz_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  garage:
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    restart: on-failure

  redis:
    image: redis:8.8.0-alpine3.23@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    ports:
      - 6379:6379
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: on-failure
