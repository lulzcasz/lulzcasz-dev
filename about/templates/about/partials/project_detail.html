<a href="{% url 'about-home' %}" class="btn btn-outline-secondary mb-4">
    &larr; Voltar para Projetos
</a>

<h1 class="fw-bold mb-3">{{ project.title }}</h1>

<div class="mb-4">
    {% for technology in project.technologies.all %}
        <span style="font-size: 16px; color: {{ technology.color }}; background-color: {{ technology.bg_color }};" class="badge">{{ technology.name }}</span>
    {% endfor technology %}
</div>

<div class="article-content mb-5 text-break">
    {{ project.content|safe }} 
</div>

<div class="d-flex gap-2">
    {% if project.source_code %}
        <a href="{{ project.source_code }}" target="_blank" class="btn btn-outline-dark">Código Fonte</a>
    {% endif %}
    {% if project.link %}
        <a href="{{ project.link }}" target="_blank" class="btn btn-primary">Acessar Projeto</a>
    {% endif %}
</div>
