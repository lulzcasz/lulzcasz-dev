<div class="my-2 p-1 bg-brand-gray flex flex-col sm:flex-row items-center gap-2 group">
  {% if product.image %}
    <div class="shrink-0 w-50 h-50 p-2 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
      <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-full object-contain">
    </div>
  {% endif %}
  <div class="flex-1 w-full flex flex-col justify-center">
    <p class="text-xl font-bold text-brand-light">{{ product.name }}</p>
    <div class="flex flex-wrap w-full gap-3">
      {% for link in product.links.all %}
        <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer" title="{{ link.store.name }}" 
           class="flex-1 min-w-[120px] h-11 flex justify-center items-center px-4 bg-brand-light hover:opacity-85 transition-opacity">
          {% if link.store.logo %}
            <img src="{{ link.store.logo.url }}" alt="{{ link.store.name }}" class="h-6 w-auto object-contain mix-blend-multiply">
          {% else %}
            <span class="text-sm font-extrabold text-brand-gray uppercase tracking-wide">{{ link.store.name }}</span>
          {% endif %}
        </a>
      {% empty %}
        <p class="text-sm text-gray-500 italic">:/</p>
      {% endfor %}
    </div>
  </div>
</div>
