<div class="my-4 p-3 bg-brand-gray flex flex-col sm:flex-row items-center sm:items-stretch gap-4 group">
  {% if product.image %}
    <div class="shrink-0 w-34 h-34 p-1 flex items-center justify-center transition-transform duration-300 group-hover:scale-105 bg-white self-center">
      <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-full object-contain !m-0">
    </div>
  {% endif %}
  <div class="flex-1 w-full flex flex-col justify-center">
    <p class="!text-base font-bold text-brand-light !m-0 !leading-tight">{{ product.name }}</p>
    <p class="!text-sm text-gray-400 !mt-1 !mb-2 font-sans line-clamp-4 !leading-normal">
      {% if product.description %}
        {{ product.description }}
      {% endif %}
    </p>
    <div class="flex flex-wrap w-full gap-2 mt-1">
      {% for link in product.links.all %}
        <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer" title="{{ link.store.name }}" 
          style="background-color: {{ link.store.color }};"
          class="flex-1 sm:flex-initial min-w-[100px] max-w-[140px] h-10 flex justify-center items-center px-3 rounded-md transition-all hover:opacity-90 !no-underline">
          {% if link.store.logo %}
            <img src="{{ link.store.logo.url }}" alt="{{ link.store.name }}" class="w-full h-6 object-contain !m-0">
          {% else %}
            <span class="!text-[11px] font-bold text-zinc-300 uppercase tracking-wide !m-0 !leading-none">{{ link.store.name }}</span>
          {% endif %}   
        </a>
      {% endfor %}
    </div>
  </div>
</div>
