{% extends 'blog/base.html' %}

{% load image_utils %}
{% load static %}
 
{% block title %}
  <title>lulzcasz.dev</title>
{% endblock title %}

{% block main %}
  {% for post in last_posts %}
    <a href="{% url 'post-detail' post_slug=post.slug %}" class="text-brand-light flex">
      {{ post.title }}
    </a>
  {% endfor %}
{% endblock main %}
